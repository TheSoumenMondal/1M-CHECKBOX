services:
  valkey:
    container_name: valkey
    hostname: valkey
    image: valkey/valkey:7.2.5
    volumes:
      - valkey-data:/data
    command: valkey-server
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

volumes:
  valkey-data:
