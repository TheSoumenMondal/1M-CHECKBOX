<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Login - Checkboxes</title>
	<style>
		:root {
			--bg-color: #0a0a0a;
			--card-bg: #171717;
			--text-color: #ededed;
			--muted-color: #888;
			--accent-color: #0070f3;
			--accent-hover: #0366d6;
			--border-color: #333;
		}
		body {
			background: var(--bg-color);
			color: var(--text-color);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}
		.card {
			background: var(--card-bg);
			border: 1px solid var(--border-color);
			padding: 40px;
			border-radius: 8px;
			text-align: center;
			box-shadow: 0 4px 20px rgba(0,0,0,0.5);
		}
		h2 {
			margin-top: 0;
			font-weight: 600;
		}
		p {
			color: var(--muted-color);
			font-size: 14px;
			margin-bottom: 24px;
		}
		a {
			color: #fff;
			background: var(--accent-color);
			padding: 12px 24px;
			text-decoration: none;
			border-radius: 4px;
			font-weight: 500;
			transition: background 0.15s ease;
			display: inline-block;
		}
		a:hover {
			background: var(--accent-hover);
		}
	</style>
</head>
<body>
	<div class="card">
		<h2>Welcome to Checkboxes</h2>
		<p>Sign in to view and toggle checkboxes!</p>
		<a href="/auth/google">Sign in with Google</a>
	</div>
</body>
</html>
